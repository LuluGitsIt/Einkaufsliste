<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Einkaufsliste Holzwerkstatt</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab-btn{
  width:auto;
  padding:10px 16px;
  background:#e9ecef;
  color:#222;
}

.tab-btn.active{
  background:#007bff;
  color:#fff;
}

.tab-content{
  display:none;
}

.tab-content.active{
  display:block;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:20px;
}

label{
  font-size:14px;
  font-weight:bold;
}

input,select,button{
  padding:10px;
  width:100%;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:#007bff;
  color:#fff;
  border:none;
  cursor:pointer;
}

button:hover{ background:#0056b3; }

button.delete{
  width:auto;
  background:#ff4d4d;
  padding:6px 10px;
}

button.delete:hover{ background:#cc0000; }

button.edit{
  width:auto;
  background:#28a745;
  padding:6px 10px;
}

button.edit:hover{ background:#1e7e34; }

button.move{
  width:auto;
  background:#ff9800;
  padding:6px 10px;
}

button.move:hover{ background:#d67f00; }

button.copy{
  width:auto;
  background:#6f42c1;
  padding:6px 10px;
}

button.copy:hover{ background:#59359c; }

h1,h2{
  border-bottom:2px solid #333;
  padding-bottom:5px;
  margin-top:25px;
}

ul{
  list-style:none;
  padding:0;
}

li{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  padding:12px;
  border-bottom:1px solid #ddd;
}

.item-info{
  display:flex;
  flex-direction:column;
  gap:4px;
  flex:1;
}

.item-name{ font-weight:bold; }

.item-details,
.item-meta{
  font-size:14px;
  color:#555;
}

.item-details a{
  color:#007bff;
  text-decoration:none;
}

.priority{
  font-size:13px;
  font-weight:bold;
  padding:4px 8px;
  border-radius:8px;
  width:fit-content;
}

.green{ background:#d4edda; color:#155724; }
.yellow{ background:#fff3cd; color:#856404; }
.red{ background:#f8d7da; color:#721c24; }

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-box{
  background:#fff;
  width:95%;
  max-width:420px;
  padding:25px;
  border-radius:14px;
}

.modal-buttons{
  display:flex;
  gap:10px;
}

.modal-buttons button{
  flex:1;
}

.cancel{
  background:#888;
}

.cancel:hover{
  background:#666;
}
</style>
</head>

<body>

<h1>🛒 Einkaufsliste Holzwerkstatt</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('listsTab', this)">Listen</button>
  <button class="tab-btn" onclick="showTab('inventoryTab', this)">Inventar</button>
</div>

<!-- ===============================
TAB 1 LISTEN
=============================== -->
<div id="listsTab" class="tab-content active">

<!-- Einkaufsliste -->
<div class="form-group">
  <h2>Einkaufsliste</h2>

  <input type="text" id="itemInput" placeholder="Artikel eingeben..." />
  <input type="text" id="itemLinkInput" placeholder="Link (optional)" />
  <input type="text" id="itemPriceInput" placeholder="Preis (optional)" />

  <label for="itemPriorityInput">Priorität</label>
  <select id="itemPriorityInput">
    <option value="green">🟢 Grün</option>
    <option value="yellow">🟡 Gelb</option>
    <option value="red">🔴 Rot</option>
  </select>

  <input type="text" id="itemUserInput" placeholder="Name" />

  <button onclick="addItem()">Hinzufügen</button>
</div>

<ul id="list"></ul>

<hr>

<!-- Wunschliste -->
<div class="form-group">
  <h2>Wunschliste</h2>

  <input type="text" id="wishNameInput" placeholder="Wunschartikel..." />
  <input type="text" id="wishLinkInput" placeholder="Link (optional)" />
  <input type="text" id="wishPriceInput" placeholder="Preis (optional)" />

  <label for="wishPriorityInput">Priorität</label>
  <select id="wishPriorityInput">
    <option value="green">🟢 Grün</option>
    <option value="yellow">🟡 Gelb</option>
    <option value="red">🔴 Rot</option>
  </select>

  <input type="text" id="wishUserInput" placeholder="Name" />

  <button onclick="addWishItem()">Wunsch hinzufügen</button>
</div>

<ul id="wishList"></ul>

</div>

<!-- ===============================
TAB 2 INVENTAR
=============================== -->
<div id="inventoryTab" class="tab-content">
  <h2>📦 Inventar</h2>
  <ul id="inventoryList"></ul>
</div>

<!-- ===============================
EDIT MODAL
=============================== -->
<div id="editModal" class="modal">
  <div class="modal-box">
    <h3>✏️ Eintrag bearbeiten</h3>

    <div class="form-group">
      <input type="text" id="editName" placeholder="Artikel">
      <input type="text" id="editLink" placeholder="Link">
      <input type="text" id="editPrice" placeholder="Preis">

      <label for="editPriority">Priorität</label>
      <select id="editPriority">
        <option value="green">🟢 Grün</option>
        <option value="yellow">🟡 Gelb</option>
        <option value="red">🔴 Rot</option>
      </select>

      <input type="text" id="editUser" placeholder="Name">
    </div>

    <div class="modal-buttons">
      <button onclick="saveEdit()">💾 Speichern</button>
      <button onclick="closeModal()" class="cancel">Abbrechen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  updateDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "DEIN_PROJEKT.firebaseapp.com",
  projectId: "DEIN_PROJEKT",
  storageBucket: "DEIN_PROJEKT.appspot.com",
  messagingSenderId: "123456",
  appId: "123456"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const listRef = collection(db,"shoppingList");
const wishRef = collection(db,"wishList");
const inventoryRef = collection(db,"inventory");

let currentEditId = null;
let currentCollection = null;

/* ======================
Helpers
====================== */
function fixUrl(url){
  if(!url) return "";
  if(!url.startsWith("http://") && !url.startsWith("https://")){
    return "https://" + url;
  }
  return url;
}

function formatDate(timestamp){
  if(!timestamp) return "";
  return new Date(timestamp).toLocaleString("de-DE");
}

window.showTab = function(id, btn){
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
};

async function saveToInventory(data){
  const q = query(inventoryRef, where("name","==",data.name));
  const snap = await getDocs(q);

  if(snap.empty){
    await addDoc(inventoryRef,{
      ...data,
      inventorySavedAt: Date.now()
    });
  }
}

/* ======================
Add
====================== */
window.addItem = async function(){
  const data = {
    name: itemInput.value.trim(),
    link: fixUrl(itemLinkInput.value.trim()),
    price: itemPriceInput.value.trim(),
    priority: itemPriorityInput.value,
    user: itemUserInput.value.trim(),
    createdAt: Date.now()
  };

  if(!data.name || !data.user) return;

  await addDoc(listRef,data);
  await saveToInventory(data);

  itemInput.value="";
  itemLinkInput.value="";
  itemPriceInput.value="";
};

window.addWishItem = async function(){
  const data = {
    name: wishNameInput.value.trim(),
    link: fixUrl(wishLinkInput.value.trim()),
    price: wishPriceInput.value.trim(),
    priority: wishPriorityInput.value,
    user: wishUserInput.value.trim(),
    createdAt: Date.now()
  };

  if(!data.name || !data.user) return;

  await addDoc(wishRef,data);
  await saveToInventory(data);

  wishNameInput.value="";
  wishLinkInput.value="";
  wishPriceInput.value="";
};

/* ======================
Edit
====================== */
window.openEditModal = function(data,id,collectionName){
  currentEditId = id;
  currentCollection = collectionName;

  editName.value = data.name || "";
  editLink.value = data.link || "";
  editPrice.value = data.price || "";
  editPriority.value = data.priority || "green";
  editUser.value = data.user || "";

  editModal.style.display = "flex";
};

window.closeModal = function(){
  editModal.style.display = "none";
};

window.saveEdit = async function(){
  const data = {
    name: editName.value.trim(),
    link: fixUrl(editLink.value.trim()),
    price: editPrice.value.trim(),
    priority: editPriority.value,
    user: editUser.value.trim()
  };

  if(!data.name || !data.user) return;

  await updateDoc(doc(db,currentCollection,currentEditId),data);
  await saveToInventory({...data, createdAt: Date.now()});

  closeModal();
};

/* ======================
Move
====================== */
async function moveItem(data,id,fromCollection){
  const targetRef = fromCollection === "shoppingList" ? wishRef : listRef;

  await addDoc(targetRef,{
    ...data
  });

  await saveToInventory(data);

  /* WICHTIG: aus alter Liste löschen */
  await deleteDoc(doc(db,fromCollection,id));
}

/* ======================
Copy from inventory
====================== */
async function copyToList(data,target){
  const targetRef = target === "shoppingList" ? listRef : wishRef;

  await addDoc(targetRef,{
    ...data,
    createdAt: Date.now()
  });
}

/* ======================
Render Normal Item
====================== */
function renderItem(docData,id,collectionName){
  const li = document.createElement("li");

  const info = document.createElement("div");
  info.className = "item-info";

  info.innerHTML = `
    <span class="item-name">${docData.name}</span>
    <span class="priority ${docData.priority || "green"}">
      ${docData.priority==="red"?"🔴 Rot":docData.priority==="yellow"?"🟡 Gelb":"🟢 Grün"}
    </span>
  `;

  if(docData.price || docData.link){
    const details = document.createElement("span");
    details.className = "item-details";

    let txt = [];
    if(docData.price) txt.push("💰 " + docData.price);

    details.innerHTML = txt.join(" | ");

    if(docData.link){
      if(txt.length > 0) details.innerHTML += " | ";
      const a = document.createElement("a");
      a.href = docData.link;
      a.target = "_blank";
      a.textContent = "🔗 Link öffnen";
      details.appendChild(a);
    }

    info.appendChild(details);
  }

  const meta = document.createElement("span");
  meta.className = "item-meta";
  meta.textContent = "📅 " + formatDate(docData.createdAt) + " | 👤 " + docData.user;
  info.appendChild(meta);

  const actions = document.createElement("div");
  actions.className = "actions";

  const editBtn = document.createElement("button");
  editBtn.className = "edit";
  editBtn.textContent = "✏️";
  editBtn.onclick = () => openEditModal(docData,id,collectionName);

  const moveBtn = document.createElement("button");
  moveBtn.className = "move";
  moveBtn.textContent = collectionName==="shoppingList" ? "➡️ Wunsch" : "⬅️ Einkauf";
  moveBtn.onclick = () => moveItem(docData,id,collectionName);

  const delBtn = document.createElement("button");
  delBtn.className = "delete";
  delBtn.textContent = "X";
  delBtn.onclick = () => deleteDoc(doc(db,collectionName,id));

  actions.append(editBtn,moveBtn,delBtn);

  li.append(info,actions);
  return li;
}

/* ======================
Render Inventory Item
====================== */
function renderInventoryItem(docData,id){
  const li = document.createElement("li");

  const info = document.createElement("div");
  info.className = "item-info";

  info.innerHTML = `
    <span class="item-name">${docData.name}</span>
    <span class="item-meta">👤 ${docData.user} | 📅 ${formatDate(docData.createdAt)}</span>
  `;

  const actions = document.createElement("div");
  actions.className = "actions";

  const copyShop = document.createElement("button");
  copyShop.className = "copy";
  copyShop.textContent = "🛒 Einkauf";
  copyShop.onclick = () => copyToList(docData,"shoppingList");

  const copyWish = document.createElement("button");
  copyWish.className = "copy";
  copyWish.textContent = "🎁 Wunsch";
  copyWish.onclick = () => copyToList(docData,"wishList");

  const delBtn = document.createElement("button");
  delBtn.className = "delete";
  delBtn.textContent = "X";
  delBtn.onclick = () => deleteDoc(doc(db,"inventory",id));

  actions.append(copyShop,copyWish,delBtn);

  li.append(info,actions);
  return li;
}

/* ======================
Live Sync
====================== */
onSnapshot(listRef,(snap)=>{
  list.innerHTML="";
  snap.forEach(d => list.appendChild(
    renderItem(d.data(),d.id,"shoppingList")
  ));
});

onSnapshot(wishRef,(snap)=>{
  wishList.innerHTML="";
  snap.forEach(d => wishList.appendChild(
    renderItem(d.data(),d.id,"wishList")
  ));
});

onSnapshot(inventoryRef,(snap)=>{
  inventoryList.innerHTML="";
  snap.forEach(d => inventoryList.appendChild(
    renderInventoryItem(d.data(),d.id)
  ));
});
</script>

</body>
</html>
