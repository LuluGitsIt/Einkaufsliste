<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Einkaufsliste Holzwerkstatt</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 15px;
    }

    input, button {
      padding: 10px;
      width: 100%;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #0056b3;
    }

    h1, h2 {
      border-bottom: 2px solid #333;
      padding-bottom: 5px;
      margin-top: 40px;
    }

    h1 { margin-top: 0; }

    ul {
      padding-left: 0;
      list-style: none;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item-name {
      font-weight: bold;
    }

    .item-details {
      font-size: 14px;
      color: #555;
    }

    .item-details a {
      color: #007bff;
      text-decoration: none;
    }

    button.delete {
      width: auto;
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
    }

    button.delete:hover {
      background: #cc0000;
    }
  </style>
</head>

<body>

  <h1>🛒 Einkaufsliste Holzwerkstatt</h1>

  <div class="form-group">
    <input type="text" id="itemInput" placeholder="Artikel eingeben..." />
    <button onclick="addItem()">Hinzufügen</button>
  </div>

  <ul id="list"></ul>

  <hr />

  <!-- ✨ Wunschliste Sektion -->
  <h2>🎁 Wunschliste</h2>

  <div class="form-group">
    <input type="text" id="wishNameInput" placeholder="Wunsch-Artikel eingeben..." />
    <input type="text" id="wishLinkInput" placeholder="Link hinzufügen (Optional)..." />
    <input type="text" id="wishPriceInput" placeholder="Preis eingeben (Optional)..." />
    <button onclick="addWishItem()">Wunsch hinzufügen</button>
  </div>

  <ul id="wishList"></ul>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      doc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    console.log("SCRIPT START");

    // 🔥 Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBP3oj8MkzyDxiFWygr7xPN4ixUbPoEVBM",
      authDomain: "einkaufsliste-138fd.firebaseapp.com",
      projectId: "einkaufsliste-138fd",
      storageBucket: "einkaufsliste-138fd.appspot.com",
      messagingSenderId: "892194095441",
      appId: "1:892194095441:web:0205864f9dcb1fb03bd370"
    };

    // 🚀 Init Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    console.log("Firebase init done");

    // 📌 Referenzen für beide Collections
    const listRef = collection(db, "shoppingList");
    const wishRef = collection(db, "wishList");

    // ➕ Add Item (Einkaufsliste)
    window.addItem = async function () {
      const input = document.getElementById("itemInput");
      const value = input.value.trim();

      if (!value) return;

      try {
        await addDoc(listRef, {
          name: value,
          createdAt: Date.now()
        });

        input.value = "";
        console.log("Einkaufsartikel gespeichert:", value);

      } catch (err) {
        console.error("Fehler beim Speichern:", err);
      }
    };

    // ➕ Add Wish Item (Wunschliste)
    window.addWishItem = async function () {
      const nameInput = document.getElementById("wishNameInput");
      const linkInput = document.getElementById("wishLinkInput");
      const priceInput = document.getElementById("wishPriceInput");

      const nameValue = nameInput.value.trim();
      let linkValue = linkInput.value.trim();
      const priceValue = priceInput.value.trim();

      if (!nameValue) return;

      // URL Validierung: Automatisch http:// hinzufügen falls vergessen
      if (linkValue && !linkValue.startsWith('http://') && !linkValue.startsWith('https://')) {
        linkValue = 'https://' + linkValue;
      }

      try {
        await addDoc(wishRef, {
          name: nameValue,
          link: linkValue || "",
          price: priceValue || "",
          createdAt: Date.now()
        });

        // Felder leeren
        nameInput.value = "";
        linkInput.value = "";
        priceInput.value = "";
        console.log("Wunsch gespeichert:", nameValue);

      } catch (err) {
        console.error("Fehler beim Speichern des Wunsches:", err);
      }
    };

    // 📡 Live Sync - Einkaufsliste
    onSnapshot(listRef, (snapshot) => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      snapshot.forEach((itemDoc) => {
        const data = itemDoc.data();
        const li = document.createElement("li");

        const span = document.createElement("span");
        span.className = "item-name";
        span.textContent = data.name;

        const btn = document.createElement("button");
        btn.textContent = "X";
        btn.className = "delete";

        btn.onclick = async () => {
          await deleteDoc(doc(db, "shoppingList", itemDoc.id));
        };

        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    });

    // 📡 Live Sync - Wunschliste
    onSnapshot(wishRef, (snapshot) => {
      const wishList = document.getElementById("wishList");
      wishList.innerHTML = "";

      snapshot.forEach((itemDoc) => {
        const data = itemDoc.data();
        const li = document.createElement("li");

        // Container für die Text-Infos
        const infoDiv = document.createElement("div");
        infoDiv.className = "item-info";

        const nameSpan = document.createElement("span");
        nameSpan.className = "item-name";
        nameSpan.textContent = data.name;
        infoDiv.appendChild(nameSpan);

        // Details (Preis & Link)
        const detailsSpan = document.createElement("span");
        detailsSpan.className = "item-details";

        let detailsArray = [];
        
        if (data.price) {
          detailsArray.push(`💰 Preis: ${data.price}`);
        }

        detailsSpan.innerHTML = detailsArray.join(" | ");

        // Falls ein Link existiert, klickbar machen
        if (data.link) {
          if (detailsArray.length > 0) detailsSpan.innerHTML += " | ";
          
          const a = document.createElement("a");
          a.href = data.link;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = "🔗 Link öffnen";
          detailsSpan.appendChild(a);
        }

        if (data.price || data.link) {
          infoDiv.appendChild(detailsSpan);
        }

        // Delete Button
        const btn = document.createElement("button");
        btn.textContent = "X";
        btn.className = "delete";

        btn.onclick = async () => {
          await deleteDoc(doc(db, "wishList", itemDoc.id));
        };

        li.appendChild(infoDiv);
        li.appendChild(btn);
        wishList.appendChild(li);
      });
    });

  </script>

</body>
</html>
