<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemeinsame Einkaufsliste</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
    }
    ul {
      padding-left: 20px;
    }
    li {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
      padding: 5px;
      border-bottom: 1px solid #ddd;
    }
    button.delete {
      width: auto;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🛒 Gemeinsame Einkaufsliste</h1>

  <input type="text" id="itemInput" placeholder="Artikel hinzufügen..." />
  <button onclick="addItem()">Hinzufügen</button>

  <ul id="list"></ul>

  <script type="module">

    // 🔥 Firebase SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ⚙️ DEINE FIREBASE KONFIGURATION HIER EINTRAGEN
    const firebaseConfig = {
      apiKey: "AIzaSyBP3oj8MkzyDxiFWygr7xPN4ixUbPoEVBM",
      authDomain: "einkaufsliste-138fd.firebaseapp.com",
      projectId: "einkaufsliste-138fd",
      storageBucket: "einkaufsliste-138fd.firebasestorage.app",
      messagingSenderId: "892194095441",
      appId: "1:892194095441:web:0205864f9dcb1fb03bd370"
    };

    // 🚀 Firebase starten
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const listRef = collection(db, "shoppingList");

    // ➕ Item hinzufügen
    window.addItem = async function () {
      const input = document.getElementById("itemInput");
      const value = input.value.trim();

      if (!value) return;

      await addDoc(listRef, {
        name: value,
        createdAt: Date.now()
      });

      input.value = "";
    };

    // 📡 Echtzeit Listener (alle Nutzer sehen Updates sofort)
    onSnapshot(listRef, (snapshot) => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      snapshot.forEach((itemDoc) => {
        const data = itemDoc.data();

        const li = document.createElement("li");

        const span = document.createElement("span");
        span.textContent = data.name;

        const btn = document.createElement("button");
        btn.textContent = "Löschen";
        btn.className = "delete";
        btn.onclick = async () => {
          await deleteDoc(doc(db, "shoppingList", itemDoc.id));
        };

        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    });

  </script>

</body>
</html>
