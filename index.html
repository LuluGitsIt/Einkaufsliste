<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Einkaufsliste Holzwerkstatt</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab-btn{
  width:auto;
  padding:10px 16px;
  background:#e9ecef;
}

.tab-btn.active{
  background:#007bff;
  color:#fff;
}

.tab-content{ display:none; }
.tab-content.active{ display:block; }

.form-group{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:20px;
}

label{
  font-size:14px;
  font-weight:bold;
}

input,select,button{
  padding:10px;
  width:100%;
  font-size:16px;
  box-sizing:border-box;
}

button{
  background:#007bff;
  color:#fff;
  border:none;
  cursor:pointer;
}

button:hover{ background:#0056b3; }

button.delete{ background:#ff4d4d; }
button.move{ background:#ff9800; }
button.copy{ background:#6f42c1; }
button.edit{ background:#28a745; }

ul{ list-style:none; padding:0; }

li{
  display:flex;
  justify-content:space-between;
  gap:15px;
  padding:12px;
  border-bottom:1px solid #ddd;
}

.item-info{
  display:flex;
  flex-direction:column;
  gap:4px;
  flex:1;
}

.priority{
  font-size:13px;
  font-weight:bold;
  padding:4px 8px;
  border-radius:8px;
  width:fit-content;
}

.green{ background:#d4edda; color:#155724; }
.yellow{ background:#fff3cd; color:#856404; }
.red{ background:#f8d7da; color:#721c24; }

.actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<h1>🛒 Einkaufssystem Holzwerkstatt</h1>
<div id="statusMsg" style="display:none;padding:10px;margin-bottom:12px;border-radius:6px;font-weight:bold;"></div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('lists')">Listen</button>
  <button class="tab-btn" onclick="switchTab('inventory')">Inventar</button>
</div>

<!-- LISTEN -->
<div id="lists" class="tab-content active">

<h2>Einkaufsliste</h2>

<div class="form-group">
  <input id="itemName" placeholder="Artikel" />
  <input id="itemLink" placeholder="Link (optional)" />
  <input id="itemPrice" placeholder="Preis (optional)" />

  <label>Priorität</label>
  <select id="itemPriority">
    <option value="green">🟢 Grün</option>
    <option value="yellow">🟡 Gelb</option>
    <option value="red">🔴 Rot</option>
  </select>

  <input id="itemUser" placeholder="Name" />
  <button onclick="addItem()">Hinzufügen</button>
</div>

<ul id="shoppingList"></ul>

<hr>

<h2>Wunschliste</h2>

<div class="form-group">
  <input id="wishName" placeholder="Artikel" />
  <input id="wishLink" placeholder="Link (optional)" />
  <input id="wishPrice" placeholder="Preis (optional)" />

  <label>Priorität</label>
  <select id="wishPriority">
    <option value="green">🟢 Grün</option>
    <option value="yellow">🟡 Gelb</option>
    <option value="red">🔴 Rot</option>
  </select>

  <input id="wishUser" placeholder="Name" />
  <button onclick="addWish()">Hinzufügen</button>
</div>

<ul id="wishList"></ul>

</div>

<!-- INVENTAR -->
<div id="inventory" class="tab-content">
<h2>📦 Inventar</h2>
<ul id="inventoryList"></ul>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  updateDoc,
  setDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBP3oj8MkzyDxiFWygr7xPN4ixUbPoEVBM",
  authDomain: "einkaufsliste-138fd.firebaseapp.com",
  projectId: "einkaufsliste-138fd",
  storageBucket: "einkaufsliste-138fd.firebasestorage.app",
  messagingSenderId: "892194095441",
  appId: "1:892194095441:web:0205864f9dcb1fb03bd370"
});

const db = getFirestore(app);

const shoppingRef = collection(db,"shoppingList");
const wishRef = collection(db,"wishList");
const inventoryRef = collection(db,"inventory");

/* =========================
   NORMALIZER (WICHTIG!)
========================= */
function normalize(data){
  return {
    name: data.name || "",
    link: data.link || "",
    price: data.price || "",
    priority: data.priority || "green",
    user: data.user || "Unbekannt",
    createdAt: data.createdAt || Date.now()
  };
}

/* =========================
   STATUS / FEHLERANZEIGE
========================= */
function showStatus(msg, isError){
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.style.display = "block";
  el.style.background = isError ? "#f8d7da" : "#d4edda";
  el.style.color = isError ? "#721c24" : "#155724";
  if(!isError) setTimeout(()=>{ el.style.display="none"; }, 3000);
}

/* =========================
   TAB SWITCH
========================= */
window.switchTab = function(id){
  document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(e=>e.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
};

/* =========================
   INVENTAR SAVE (deduped via setDoc)
========================= */
async function saveToInventory(data, id){
  const item = normalize(data);
  await setDoc(doc(inventoryRef, id), {
    ...item,
    savedAt: Date.now()
  });
}

/* =========================
   ADD
========================= */
window.addItem = async function(){
  const data = normalize({
    name:itemName.value,
    link:itemLink.value,
    price:itemPrice.value,
    priority:itemPriority.value,
    user:itemUser.value
  });

  if(!data.name || !data.user) return;

  try {
    const shopRef = await addDoc(shoppingRef, data);
    await saveToInventory(data, shopRef.id);
    showStatus("✅ Gespeichert: " + data.name, false);
    itemName.value="";
    itemLink.value="";
    itemPrice.value="";
  } catch(e) {
    showStatus("❌ Fehler beim Speichern: " + e.message, true);
    console.error(e);
  }
};

window.addWish = async function(){
  const data = normalize({
    name:wishName.value,
    link:wishLink.value,
    price:wishPrice.value,
    priority:wishPriority.value,
    user:wishUser.value
  });

  if(!data.name || !data.user) return;

  try {
    const wRef = await addDoc(wishRef, data);
    await saveToInventory(data, wRef.id);
    showStatus("✅ Gespeichert: " + data.name, false);
    wishName.value="";
    wishLink.value="";
    wishPrice.value="";
  } catch(e) {
    showStatus("❌ Fehler beim Speichern: " + e.message, true);
    console.error(e);
  }
};

/* =========================
   MOVE (kein Duplikat!)
========================= */
async function move(data,id,from){
  const target = from==="shoppingList" ? wishRef : shoppingRef;

  const newRef = await addDoc(target, normalize(data));
  // Inventareintrag unter neuer ID anlegen, alter bleibt als Historie
  await saveToInventory(normalize(data), newRef.id);
  await deleteDoc(doc(db,from,id));
}

/* =========================
   COPY FROM INVENTORY
========================= */
async function copyTo(target,data){
  const ref = target==="shoppingList" ? shoppingRef : wishRef;
  await addDoc(ref,normalize(data));
}

/* =========================
   RENDER ITEM
========================= */
function render(data,id,collection){
  const li = document.createElement("li");

  const info = document.createElement("div");
  info.className="item-info";

  info.innerHTML=`
    <strong>${data.name}</strong>
    <span class="priority ${data.priority}">
      ${data.priority}
    </span>
    <small>👤 ${data.user} | 📅 ${new Date(data.createdAt).toLocaleString()}</small>
  `;

  const actions = document.createElement("div");
  actions.className="actions";

  const moveBtn = document.createElement("button");
  moveBtn.className="move";
  moveBtn.textContent = collection==="shoppingList" ? "➡️ Wunsch" : "⬅️ Einkauf";
  moveBtn.onclick=()=>move(data,id,collection);

  const del = document.createElement("button");
  del.className="delete";
  del.textContent="X";
  del.onclick = async () => {
    await saveToInventory(data, id);
    await deleteDoc(doc(db, collection, id));
  };

  actions.append(moveBtn,del);

  li.append(info,actions);
  return li;
}

/* =========================
   INVENTORY RENDER
========================= */
function renderInv(data,id){
  const li=document.createElement("li");

  const info=document.createElement("div");
  info.innerHTML=`
    <strong>${data.name}</strong>
    <small>👤 ${data.user}</small>
  `;

  const actions=document.createElement("div");
  actions.className="actions";

  const toShop=document.createElement("button");
  toShop.className="copy";
  toShop.textContent="🛒 Einkauf";
  toShop.onclick=()=>copyTo("shoppingList",data);

  const toWish=document.createElement("button");
  toWish.className="copy";
  toWish.textContent="🎁 Wunsch";
  toWish.onclick=()=>copyTo("wishList",data);

  const del=document.createElement("button");
  del.className="delete";
  del.textContent="X";
  del.onclick=()=>deleteDoc(doc(db,"inventory",id));

  actions.append(toShop,toWish,del);

  li.append(info,actions);
  return li;
}

/* =========================
   LIVE SYNC
========================= */
onSnapshot(shoppingRef, s=>{
  shoppingList.innerHTML="";
  s.forEach(d=>shoppingList.appendChild(render(d.data(),d.id,"shoppingList")));
}, e=>showStatus("❌ Firebase-Verbindungsfehler: " + e.message, true));

onSnapshot(wishRef, s=>{
  wishList.innerHTML="";
  s.forEach(d=>wishList.appendChild(render(d.data(),d.id,"wishList")));
}, e=>showStatus("❌ Firebase-Verbindungsfehler: " + e.message, true));

onSnapshot(inventoryRef, s=>{
  inventoryList.innerHTML="";
  s.forEach(d=>inventoryList.appendChild(renderInv(d.data(),d.id)));
}, e=>showStatus("❌ Firebase-Verbindungsfehler: " + e.message, true));

</script>

</body>
</html>
