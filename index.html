<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Einkaufsliste Holzwerkstatt</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}

input, select, button {
  padding: 10px;
  width: 100%;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

button.delete {
  width: auto;
  background: #ff4d4d;
  padding: 6px 10px;
}

button.delete:hover {
  background: #cc0000;
}

h1, h2 {
  border-bottom: 2px solid #333;
  padding-bottom: 5px;
  margin-top: 35px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
  padding: 12px;
  border-bottom: 1px solid #ddd;
}

.item-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.item-name {
  font-weight: bold;
}

.item-details {
  font-size: 14px;
  color: #555;
}

.item-details a {
  color: #007bff;
  text-decoration: none;
}

.priority {
  font-size: 13px;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 8px;
  width: fit-content;
}

.green {
  background: #d4edda;
  color: #155724;
}

.yellow {
  background: #fff3cd;
  color: #856404;
}

.red {
  background: #f8d7da;
  color: #721c24;
}
</style>
</head>

<body>

<h1>🛒 Einkaufsliste Holzwerkstatt</h1>

<!-- Einkaufsliste -->
<div class="form-group">
  <input type="text" id="itemInput" placeholder="Artikel eingeben..." />
  <input type="text" id="itemLinkInput" placeholder="Link (optional)" />
  <input type="text" id="itemPriceInput" placeholder="Preis (optional)" />

  <select id="itemPriorityInput">
    <option value="green">🟢 Grün</option>
    <option value="yellow">🟡 Gelb</option>
    <option value="red">🔴 Rot</option>
  </select>

  <button onclick="addItem()">Hinzufügen</button>
</div>

<ul id="list"></ul>

<hr>

<!-- Wunschliste -->
<h2>🎁 Wunschliste</h2>

<div class="form-group">
  <input type="text" id="wishNameInput" placeholder="Wunschartikel..." />
  <input type="text" id="wishLinkInput" placeholder="Link (optional)" />
  <input type="text" id="wishPriceInput" placeholder="Preis (optional)" />

  <select id="wishPriorityInput">
    <option value="green">🟢 Grün</option>
    <option value="yellow">🟡 Gelb</option>
    <option value="red">🔴 Rot</option>
  </select>

  <button onclick="addWishItem()">Wunsch hinzufügen</button>
</div>

<ul id="wishList"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "DEIN_PROJEKT.firebaseapp.com",
  projectId: "DEIN_PROJEKT",
  storageBucket: "DEIN_PROJEKT.appspot.com",
  messagingSenderId: "123456",
  appId: "123456"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const listRef = collection(db, "shoppingList");
const wishRef = collection(db, "wishList");

function fixUrl(url) {
  if (!url) return "";
  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    return "https://" + url;
  }
  return url;
}

/* =========================
   Einkaufsliste speichern
========================= */
window.addItem = async function () {
  const name = document.getElementById("itemInput").value.trim();
  const link = fixUrl(document.getElementById("itemLinkInput").value.trim());
  const price = document.getElementById("itemPriceInput").value.trim();
  const priority = document.getElementById("itemPriorityInput").value;

  if (!name) return;

  await addDoc(listRef, {
    name,
    link,
    price,
    priority,
    createdAt: Date.now()
  });

  document.getElementById("itemInput").value = "";
  document.getElementById("itemLinkInput").value = "";
  document.getElementById("itemPriceInput").value = "";
};

/* =========================
   Wunschliste speichern
========================= */
window.addWishItem = async function () {
  const name = document.getElementById("wishNameInput").value.trim();
  const link = fixUrl(document.getElementById("wishLinkInput").value.trim());
  const price = document.getElementById("wishPriceInput").value.trim();
  const priority = document.getElementById("wishPriorityInput").value;

  if (!name) return;

  await addDoc(wishRef, {
    name,
    link,
    price,
    priority,
    createdAt: Date.now()
  });

  document.getElementById("wishNameInput").value = "";
  document.getElementById("wishLinkInput").value = "";
  document.getElementById("wishPriceInput").value = "";
};

/* =========================
   Darstellung
========================= */
function createItem(docData, id, collectionName) {
  const li = document.createElement("li");

  const info = document.createElement("div");
  info.className = "item-info";

  const name = document.createElement("span");
  name.className = "item-name";
  name.textContent = docData.name;
  info.appendChild(name);

  const prio = document.createElement("span");
  prio.className = "priority " + docData.priority;
  prio.textContent =
    docData.priority === "green"
      ? "🟢 Grün"
      : docData.priority === "yellow"
      ? "🟡 Gelb"
      : "🔴 Rot";

  info.appendChild(prio);

  const details = document.createElement("span");
  details.className = "item-details";

  let txt = [];

  if (docData.price) txt.push("💰 " + docData.price);

  details.innerHTML = txt.join(" | ");

  if (docData.link) {
    if (txt.length > 0) details.innerHTML += " | ";

    const a = document.createElement("a");
    a.href = docData.link;
    a.target = "_blank";
    a.textContent = "🔗 Link öffnen";

    details.appendChild(a);
  }

  if (docData.price || docData.link) {
    info.appendChild(details);
  }

  const btn = document.createElement("button");
  btn.className = "delete";
  btn.textContent = "X";

  btn.onclick = async () => {
    await deleteDoc(doc(db, collectionName, id));
  };

  li.appendChild(info);
  li.appendChild(btn);

  return li;
}

/* =========================
   Live Sync Einkaufsliste
========================= */
onSnapshot(listRef, (snapshot) => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach((itemDoc) => {
    list.appendChild(
      createItem(itemDoc.data(), itemDoc.id, "shoppingList")
    );
  });
});

/* =========================
   Live Sync Wunschliste
========================= */
onSnapshot(wishRef, (snapshot) => {
  const list = document.getElementById("wishList");
  list.innerHTML = "";

  snapshot.forEach((itemDoc) => {
    list.appendChild(
      createItem(itemDoc.data(), itemDoc.id, "wishList")
    );
  });
});
</script>

</body>
</html>
